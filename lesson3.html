    <script>
        // ========== ЗВУКИ ==========
        function playErrorSound() {
            const audio = new Audio('audio/error.mp3');
            audio.play().catch(e => console.log('Audio error:', e));
        }
        function playSuccessSound() {
            const audio = new Audio('audio/success.mp3');
            audio.play().catch(e => console.log('Audio error:', e));
        }
        function playAudio(path) {
            const audio = new Audio(path);
            audio.play().catch(e => console.log('Audio error:', e));
        }

        // ========== ЗАЩИТА ВЫХОДА ==========
        let pendingExitUrl = null;

        function showExitConfirmModal(targetUrl) {
            pendingExitUrl = targetUrl;
            const modal = document.getElementById('exitLessonModal');
            if (modal) modal.classList.add('active');
        }

        function closeExitModal() {
            const modal = document.getElementById('exitLessonModal');
            if (modal) modal.classList.remove('active');
            pendingExitUrl = null;
        }

        function setupMenuProtection() {
            const menuLinks = document.querySelectorAll('.sidebar-item');
            menuLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const targetUrl = link.getAttribute('href');
                    if (targetUrl && targetUrl !== '#') {
                        e.preventDefault();
                        showExitConfirmModal(targetUrl);
                    }
                });
            });
        }

        function addExitButton() {
            const existingBtn = document.querySelector('.exit-lesson-btn');
            if (existingBtn) existingBtn.remove();
            const exitBtn = document.createElement('button');
            exitBtn.className = 'exit-lesson-btn';
            exitBtn.innerHTML = '<i class="fas fa-home"></i>';
            exitBtn.onclick = () => showExitConfirmModal('lessons.html');
            document.body.appendChild(exitBtn);
        }

        // ========== ДОБАВЛЕНИЕ СЛОВА В ТРЕНИРОВКУ ==========
        function addWordToReview(word, pinyin = '') {
            const user = getCurrentUser();
            if (!user) return false;
            
            const users = getUsers();
            const idx = users.findIndex(u => u.id === user.id);
            if (idx !== -1) {
                if (!users[idx].wordsToReview) users[idx].wordsToReview = [];
                if (!users[idx].wordsToReview.includes(word)) {
                    users[idx].wordsToReview.push(word);
                    saveUsers(users);
                    showToast(`✅ Слово "${word}" добавлено в тренировку!`, '#4CAF50');
                    return true;
                } else {
                    showToast(`⚠️ Слово "${word}" уже в тренировке!`, '#ff9800');
                    return false;
                }
            }
            return false;
        }

        function showToast(message, color) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: ${color}; color: white; padding: 10px 20px; border-radius: 40px; font-size: 14px; z-index: 10000; animation: fadeOut 2s forwards;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function addReviewButton(currentWord, currentPinyin = '') {
            const existingBtn = document.querySelector('.add-to-review-btn');
            if (existingBtn) existingBtn.remove();
            
            const reviewBtn = document.createElement('button');
            reviewBtn.className = 'add-to-review-btn';
            reviewBtn.innerHTML = '<i class="fas fa-bookmark"></i>';
            reviewBtn.onclick = () => addWordToReview(currentWord, currentPinyin);
            document.body.appendChild(reviewBtn);
        }

        function saveLessonResults(percentCorrect) {
            const user = getCurrentUser();
            if (!user) return;
            const users = getUsers();
            const idx = users.findIndex(u => u.id === user.id);
            if (idx !== -1) {
                if (!users[idx].lessonResults) users[idx].lessonResults = {};
                users[idx].lessonResults[lessonNumber] = {
                    correct: correctCount,
                    total: totalAttempts,
                    percent: percentCorrect,
                    date: new Date().toISOString()
                };
                saveUsers(users);
            }
        }

        function updateProgress() {
            const percent = (currentIndex / exercises.length) * 100;
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = percent + '%';
        }

        function showResult(isCorrect, correctAnswer, onNext, onRetry) {
            totalAttempts++;
            if (isCorrect) correctCount++;
            
            const overlay = document.createElement('div');
            overlay.className = 'result-overlay';
            overlay.innerHTML = `
                <div class="result-card ${isCorrect ? 'correct' : 'wrong'}">
                    <div class="result-icon">${isCorrect ? '🎉' : '❌'}</div>
                    <div class="result-title">${isCorrect ? 'Правильно!' : 'Неправильно'}</div>
                    ${!isCorrect && correctAnswer ? `<div class="result-details">${correctAnswer}</div>` : ''}
                    <div class="action-buttons">
                        ${isCorrect ? '<button class="next-btn" id="resultNextBtn">Далее</button>' : '<button class="tryagain-btn" id="resultRetryBtn">Попробовать еще раз</button>'}
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            if (isCorrect) {
                playSuccessSound();
                document.getElementById('resultNextBtn').onclick = () => {
                    overlay.remove();
                    if (typeof onNext === 'function') onNext();
                };
            } else {
                playErrorSound();
                document.getElementById('resultRetryBtn').onclick = () => {
                    overlay.remove();
                    if (typeof onRetry === 'function') onRetry();
                };
            }
        }

        function resetLesson() {
            if (confirm('Вы действительно хотите пройти урок заново? Весь прогресс по этому уроку будет сброшен.')) {
                const user = getCurrentUser();
                if (user) {
                    const users = getUsers();
                    const idx = users.findIndex(u => u.id === user.id);
                    if (idx !== -1) {
                        if (users[idx].completedLessons) {
                            users[idx].completedLessons = users[idx].completedLessons.filter(id => id !== lessonNumber);
                        }
                        if (users[idx].learnedWords) {
                            users[idx].learnedWords = users[idx].learnedWords.filter(w => !lessonWords.map(lw => lw.chinese).includes(w));
                        }
                        saveUsers(users);
                        const { password: _, ...updatedUser } = users[idx];
                        setCurrentUser(updatedUser);
                    }
                }
                currentIndex = 0;
                correctCount = 0;
                totalAttempts = 0;
                updateProgress();
                renderCurrent();
                
                showToast('🔄 Прогресс урока сброшен. Начинаем заново!', '#4CAF50');
            }
        }

                        <p><strong>Результаты урока:</strong></p>
                        <p>✅ Правильно: ${correctCount}</p>
                        <p>❌ Неправильно: ${totalAttempts - correctCount}</p>
                        <p>📊 Процент правильности: ${percentCorrect}%</p>
                        <hr style="margin: 1rem 0;">
                        <p><strong>Вы выучили:</strong></p>
                        <div class="words-list" id="wordsList">
                            ${getLessonWordsList()}
                        </div>
                        <p style="font-size: 0.8rem; color: #888; margin-top: 1rem;">✨ Нажмите на +, чтобы добавить слово в тренировку для повторения ✨</p>
                    </div>
                    <button class="next-btn" id="finishLessonBtn">Завершить урок</button>
                </div>
            `;
            
            saveLessonResults(percentCorrect);
            
            const resetBtn = document.createElement('button');
            resetBtn.className = 'reset-lesson-btn';
            resetBtn.innerHTML = '<i class="fas fa-undo-alt"></i>';
            resetBtn.onclick = resetLesson;
            document.body.appendChild(resetBtn);
            
            document.getElementById('finishLessonBtn').onclick = () => {
                const btn = document.querySelector('.reset-lesson-btn');
                if (btn) btn.remove();
                
                const user = getCurrentUser();
                if (user) {
                    const users = getUsers();
                    const idx = users.findIndex(u => u.id === user.id);
                    if (idx !== -1) {
                        if (!users[idx].completedLessons) users[idx].completedLessons = [];
                        if (!users[idx].completedLessons.includes(lessonNumber)) users[idx].completedLessons.push(lessonNumber);
                        if (!users[idx].learnedWords) users[idx].learnedWords = [];
                        lessonWords.forEach(w => { if (!users[idx].learnedWords.includes(w.chinese)) users[idx].learnedWords.push(w.chinese); });
                        if (!users[idx].lessonResults) users[idx].lessonResults = {};
                        users[idx].lessonResults[lessonNumber] = { correct: correctCount, total: totalAttempts, percent: percentCorrect, date: new Date().toISOString() };
                        if (!users[idx].dailyProgress) users[idx].dailyProgress = {};
                        const today = new Date().toISOString().split('T')[0];
                        if (!users[idx].dailyProgress[today]) users[idx].dailyProgress[today] = { newWords: 0, correctPercent: 0 };
                        users[idx].dailyProgress[today].correctPercent = percentCorrect;
                        saveUsers(users);
                        const { password: _, ...updatedUser } = users[idx];
                        setCurrentUser(updatedUser);
                    }
                }
                window.location.href = 'lessons.html';
            };
        }

        function renderCurrent() {
            const existingResetBtn = document.querySelector('.reset-lesson-btn');
            if (existingResetBtn) existingResetBtn.remove();
            const existingExitBtn = document.querySelector('.exit-lesson-btn');
            if (existingExitBtn) existingExitBtn.remove();
            const existingReviewBtn = document.querySelector('.add-to-review-btn');
            if (existingReviewBtn) existingReviewBtn.remove();

            const ex = exercises[currentIndex];
            if (!ex || ex.type === 'completion') {
                renderCompletion();
                return;
            }
            switch(ex.type) {
                case 'image-choice': renderImageChoice(ex); break;
                case 'hanzi-choice': renderHanziChoice(ex); break;
                case 'fill-blanks-number': renderFillBlanksNumber(ex); break;
                case 'fill-blanks': renderFillBlanks(ex); break;
                case 'dialogue-blank': renderDialogueBlank(ex); break;
                case 'fill-blanks-two': renderFillBlanksTwo(ex); break;
                case 'translation-choice': renderTranslationChoice(ex); break;
                default: renderImageChoice(ex);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            currentIndex = 0;
            correctCount = 0;
            totalAttempts = 0;
            updateProgress();
            renderCurrent();
            setupMenuProtection();

            const confirmBtn = document.getElementById('confirmExitBtn');
            const cancelBtn = document.getElementById('cancelExitBtn');
            const modal = document.getElementById('exitLessonModal');
            if (confirmBtn) confirmBtn.onclick = () => { if (pendingExitUrl) window.location.href = pendingExitUrl; closeExitModal(); };
            if (cancelBtn) cancelBtn.onclick = closeExitModal;
            if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) closeExitModal(); });
        });
    </script>

    <div id="exitLessonModal" class="modal-overlay">
        <div class="modal-container" style="max-width: 400px;">
            <div class="modal-icon">⚠️</div>
            <h3 class="modal-title">Выйти из урока?</h3>
            <p class="modal-text">Весь непройденный прогресс будет потерян.<br>Вы уверены, что хотите выйти?</p>
            <div class="modal-buttons">
                <button id="confirmExitBtn" class="modal-btn primary">Да, выйти</button>
                <button id="cancelExitBtn" class="modal-btn secondary">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW зарегистрирован:', reg))
                .catch(err => console.log('SW ошибка:', err));
        }
    </script>
    
</body>
</html>
