<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cHeeSecaKe">
<link rel="apple-touch-icon" href="images/logo-192.png">
    <title>Вход / Регистрация — cHeeSecaKe</title>
    <link rel="icon" href="images/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7B001C">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo-small">
                    <i class="fas fa-language"></i> cHeeSecaKe 1
                </div>
                <h2>Добро пожаловать</h2>
                <p>Войдите или создайте аккаунт</p>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Электронная почта" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                </div>
                <button id="loginBtn" class="auth-btn">Войти</button>
                <p class="auth-switch">
                    Нет аккаунта? <span id="showRegister" class="switch-link">Зарегистрироваться</span>
                </p>
                <div id="loginError" class="error-message"></div>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Имя" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="number" id="regAge" placeholder="Возраст" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Электронная почта" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Пароль (минимум 4 символа)" required>
                </div>
                <button id="registerBtn" class="auth-btn">Зарегистрироваться</button>
                <p class="auth-switch">
                    Уже есть аккаунт? <span id="showLogin" class="switch-link">Войти</span>
                </p>
                <div id="regError" class="error-message"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
    // Регистрация Service Worker для офлайн-работы
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
                console.log('Service Worker зарегистрирован:', registration);
            })
            .catch((error) => {
                console.log('Ошибка регистрации Service Worker:', error);
            });
    }
</script>
</body>
</html>
